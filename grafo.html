layout: page
title: Grafo
subtitle: "Le connessioni tra gli articoli"
---

<style>
  #graph-container {
    width: 100%;
    height: 600px;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    background: var(--graph-bg, #fafafa);
    overflow: hidden;
    position: relative;
  }

  .dark-mode #graph-container {
    background: #1a1a1a;
    border-color: #333;
  }

  #graph-container svg {
    width: 100%;
    height: 100%;
  }

  .node circle {
    stroke-width: 2px;
    cursor: pointer;
    transition: r 0.2s;
  }

  .node text {
    font-size: 12px;
    font-family: inherit;
    pointer-events: none;
    fill: #333;
  }

  .dark-mode .node text {
    fill: #ddd;
  }

  .link {
    stroke: #ccc;
    stroke-opacity: 0.7;
    stroke-width: 1.5px;
  }

  .dark-mode .link {
    stroke: #444;
  }

  .node circle:hover {
    stroke-width: 3px;
  }

  #graph-legend {
    margin-top: 1rem;
    font-size: 0.85rem;
    color: #888;
    text-align: center;
  }

  #tooltip {
    position: absolute;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    max-width: 200px;
    z-index: 10;
  }

  .dark-mode #tooltip {
    background: #2a2a2a;
    border-color: #444;
    color: #ddd;
  }
</style>

<div id="graph-container">
  <div id="tooltip"></div>
  <svg id="graph-svg"></svg>
</div>

<div id="graph-legend">
  Clicca su un nodo per aprire l'articolo &nbsp;·&nbsp; Trascina per esplorare
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

<script>
  // ── Dati del grafo ──────────────────────────────────────────────────────────
  // Aggiorna questo oggetto ogni volta che aggiungi un articolo o un link nuovo
  const graphData = {
    nodes: [
      {
        id: "mail-truffa",
        label: "NON aprire le mail!",
        url: "/tempa/2026-05-16-mail-truffa/",
        tags: ["sicurezza digitale", "phishing"],
        size: 18
      },
      {
        id: "truffe-whatsapp",
        label: "NON rispondere su WhatsApp!",
        url: "/tempa/2026-05-26-truffe-whatsapp/",
        tags: ["sicurezza digitale", "whatsapp"],
        size: 18
      }
    ],
    links: [
      { source: "mail-truffa", target: "truffe-whatsapp" },
      { source: "truffe-whatsapp", target: "mail-truffa" }
    ]
  };

  // ── Colori per tag ──────────────────────────────────────────────────────────
  const tagColors = {
    "sicurezza digitale": "#e07b54",
    "phishing":           "#5b8dd9",
    "whatsapp":           "#4caf7d",
    "società":            "#9c6fde",
    "default":            "#aaaaaa"
  };

  function nodeColor(node) {
    for (const tag of (node.tags || [])) {
      if (tagColors[tag]) return tagColors[tag];
    }
    return tagColors["default"];
  }

  // ── Setup SVG ───────────────────────────────────────────────────────────────
  const container = document.getElementById("graph-container");
  const svg = d3.select("#graph-svg");
  const tooltip = document.getElementById("tooltip");

  const width  = container.clientWidth;
  const height = container.clientHeight;

  const g = svg.append("g");

  // Zoom & pan
  svg.call(d3.zoom()
    .scaleExtent([0.3, 3])
    .on("zoom", (event) => g.attr("transform", event.transform))
  );

  // ── Simulazione forza ───────────────────────────────────────────────────────
  const simulation = d3.forceSimulation(graphData.nodes)
    .force("link", d3.forceLink(graphData.links)
      .id(d => d.id)
      .distance(160))
    .force("charge", d3.forceManyBody().strength(-300))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collision", d3.forceCollide().radius(d => d.size + 20));

  // ── Link ────────────────────────────────────────────────────────────────────
  const link = g.append("g")
    .selectAll("line")
    .data(graphData.links)
    .join("line")
    .attr("class", "link");

  // ── Nodi ────────────────────────────────────────────────────────────────────
  const node = g.append("g")
    .selectAll("g")
    .data(graphData.nodes)
    .join("g")
    .attr("class", "node")
    .call(d3.drag()
      .on("start", dragStart)
      .on("drag",  dragging)
      .on("end",   dragEnd)
    )
    .on("click", (event, d) => {
      window.location.href = d.url;
    })
    .on("mouseover", (event, d) => {
      tooltip.style.opacity = "1";
      tooltip.innerHTML = `<strong>${d.label}</strong><br><small>${(d.tags || []).join(", ")}</small>`;
    })
    .on("mousemove", (event) => {
      const rect = container.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 12) + "px";
      tooltip.style.top  = (event.clientY - rect.top  - 10) + "px";
    })
    .on("mouseout", () => {
      tooltip.style.opacity = "0";
    });

  node.append("circle")
    .attr("r", d => d.size)
    .attr("fill", d => nodeColor(d))
    .attr("stroke", d => d3.color(nodeColor(d)).darker(0.5));

  node.append("text")
    .attr("dy", d => d.size + 14)
    .attr("text-anchor", "middle")
    .text(d => d.label.length > 28 ? d.label.slice(0, 26) + "…" : d.label);

  // ── Tick ────────────────────────────────────────────────────────────────────
  simulation.on("tick", () => {
    link
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);

    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  // ── Drag ────────────────────────────────────────────────────────────────────
  function dragStart(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  }
  function dragging(event, d) {
    d.fx = event.x; d.fy = event.y;
  }
  function dragEnd(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null; d.fy = null;
  }
</script>
